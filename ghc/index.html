        :root {

        }

        body {

            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* ── Navbar Brand Overrides ── */
        .navbar {
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06);
        }

        .btn-outline-primary {
            --bs-btn-color: var(--brand);
            --bs-btn-border-color: var(--brand);
            --bs-btn-hover-bg: var(--brand);
            --bs-btn-hover-border-color: var(--brand);
            --bs-btn-active-bg: var(--brand-dark);
            --bs-btn-active-border-color: var(--brand-dark);
        }

        .btn-outline-primary:hover {
            color: #fff;
        }

        /* ── Hero ── */
        .hero-section {
            background: linear-gradient(135deg, #fff 0%, var(--brand-light) 100%);
            border-bottom: 3px solid var(--brand);
            position: relative;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .hero-section::after {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 200px;
            height: 200px;
            background: rgba(var(--brand-rgb), 0.06);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero-title {
            color: #1a1a2e;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .hero-accent {
            color: var(--brand);
        }

        .hero-badge {
            display: inline-block;
            background: var(--brand);
            color: #fff;
            font-size: 0.8rem;
            padding: 5px 14px;
            border-radius: 30px;
            letter-spacing: 0.6px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* ── Card ── */
        .course-card {
            border: none;
            border-radius: var(--card-radius);
            background: #fff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            transition: box-shadow var(--transition-speed), transform var(--transition-speed);
            overflow: hidden;
        }

        .course-card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .card-header-custom {
            cursor: pointer;
            padding: 1.25rem 1.5rem;
            background: #fff;
            border-bottom: 1px solid #eef0f2;
            transition: background var(--transition-speed), border-color var(--transition-speed);
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }

        .card-header-custom:hover {
            background: #fdfdff;
            border-color: #e0e0e0;
        }

        .card-header-custom.active {
            background: var(--brand-light);
            border-bottom-color: rgba(var(--brand-rgb), 0.25);
        }

        .card-header-custom .toggle-icon {
            position: absolute;
            right: 1.3rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: var(--brand);
            transition: transform var(--transition-speed);
            pointer-events: none;
        }

        .card-header-custom.active .toggle-icon {
            transform: translateY(-50%) rotate(180deg);
        }

        .course-title {
            font-weight: 700;
            font-size: 1.05rem;
            color: #1a1a2e;
            margin: 0;
            padding-right: 32px;
            line-height: 1.4;
        }

        .course-institution {
            font-size: 0.85rem;
            color: #6c757d;
            font-weight: 500;
        }

        .category-badge {
            display: inline-block;
            background: rgba(var(--brand-rgb), 0.08);
            color: var(--brand);
            font-size: 0.72rem;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 0.3px;
            width: fit-content;
            border: 1px solid rgba(var(--brand-rgb), 0.15);
        }

        /* ── Card Body (expandable) ── */
        .card-body-expand {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            padding: 0 1.5rem;
            transition: max-height 0.45s ease, opacity var(--transition-speed) ease, padding 0.45s ease;
            background: #fff;
        }

        .card-body-expand.open {
            max-height: 600px;
            opacity: 1;
            padding: 1.25rem 1.5rem 1.5rem;
        }

        .card-body-expand .description {
            font-size: 0.9rem;
            color: #495057;
            line-height: 1.7;
            margin-bottom: 1rem;
        }

        .instructor-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
            color: #343a40;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .instructor-row .bi {
            font-size: 1.5rem;
            color: var(--brand);
            opacity: 0.7;
        }

        .quota-badge {
            display: inline-block;
            font-size: 0.78rem;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .quota-credit {
            background: #fff8e1;
            color: #b45309;
            border: 1px solid #fde68a;
        }

        .quota-audit {
            background: #e8f4fd;
            color: #1e5f8a;
            border: 1px solid #bfddf7;
        }

        .quota-closed {
            background: #fce4e4;
            color: #a71d2a;
            border: 1px solid #f5c6cb;
        }

        .quota-nolimit {
            background: #e6f7ec;
            color: #166534;
            border: 1px solid #b7e4c7;
        }

        /* ── Search & Filter ── */
        .search-wrapper {
            position: relative;
            max-width: 500px;
            margin: 0 auto 2rem;
        }

        .search-wrapper .bi-search {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.1rem;
        }

        .search-input {
            width: 100%;
            padding: 12px 18px 12px 44px;
            border-radius: 50px;
            border: 2px solid #e0e0e0;
            font-size: 0.95rem;
            transition: all var(--transition-speed);
            background: #fff;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(var(--brand-rgb), 0.08);
        }

        .results-count {
            text-align: center;
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 1.5rem;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        .no-results .bi {
            font-size: 10rem;
            display: block;
            margin-bottom: 1rem;
            color: #ddd;
        }

        /* ── Responsive ── */
        @media (max-width: 576px) {
            .card-header-custom {
                padding: 1rem 1.1rem;
            }

            .card-body-expand.open {
                padding: 1rem 1.1rem 1.25rem;
            }

            .course-title {
                font-size: 0.95rem;
            }

            .hero-title {
                font-size: 1.6rem;
            }

            .toggle-icon {
                right: 0.9rem;
            }
        }

        /* ── Footer ── */
        footer {
            background: #fff;
            border-top: 3px solid var(--brand) !important;
        }

        footer a {
            color: #555;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--brand);
        }

        footer .bi {
            color: var(--brand);
        }
    </style>

    <!-- ═══════════ RENDERING SCRIPT ═══════════ -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
          const modalEl = document.getElementById('courseModal');
          window.courseModal = new bootstrap.Modal(modalEl);
      });
        (function() {
            const grid = document.getElementById('courseGrid');
            const noResults = document.getElementById('noResults');
            const resultsCount = document.getElementById('resultsCount');
            const searchInput = document.getElementById('searchInput');

            /**
             * Menentukan kelas badge kuota berdasarkan nilainya.
             */
            function getQuotaClass(value) {
                const v = value.toString().toLowerCase().trim();
                if (v === 'closed') return 'quota-closed';
                if (v === 'no limit' || v === 'nolimit') return 'quota-nolimit';
                // numeric
                if (/^\d+$/.test(v)) return 'quota-credit';
                return 'quota-credit';
            }

            /**
             * Membuat elemen HTML untuk satu card course.
             */
            function createCard(course) {
              const col = document.createElement('div');
              col.className = 'col';
              col.setAttribute('data-search', [
                  course.courseName,
                  course.institution,
                  course.category,
                  course.instructor,
                  course.description
              ].join(' ').toLowerCase());
          
              const card = document.createElement('div');
              const creditClass = getQuotaClass(course.creditQuota);
              const auditClass = getQuotaClass(course.auditQuota);
              card.className = 'card course-card h-100';
              card.style.cursor = 'pointer';
          
              // ── CONTENT CARD ──
              card.innerHTML = `
                  <div class="card-header-custom d-flex flex-column h-100">
                      <span class="category-badge">${escapeHTML(course.category)}</span>
                      <h5 class="course-title">${escapeHTML(course.courseName)}</h5>
                      <span class="course-institution">${escapeHTML(course.institution)}</span>
                      <div class="mt-auto pt-3">
                          <span class="quota-badge ${creditClass}">
                              Credit : ${escapeHTML(course.creditQuota)}
                          </span>
                          <span class="quota-badge ${auditClass}">
                              Audit : ${escapeHTML(course.auditQuota)}
                          </span>
                      </div>
                  </div>
              `;
          
              // ── EVENT CLICK → MODAL ──
              card.addEventListener('click', function () {
                  const creditClass = getQuotaClass(course.creditQuota);
                  const auditClass = getQuotaClass(course.auditQuota);
          
                  document.getElementById('modalTitle').innerText = course.courseName;
          
                  document.getElementById('modalBody').innerHTML = `
                      <span class="category-badge mb-2">${escapeHTML(course.category)}</span>
          
                      <p class="description mt-2">${escapeHTML(course.description)}</p>
          
                      <div class="instructor-row">
                          <i class="bi bi-person-circle"></i>
                          <span>${escapeHTML(course.instructor)}</span>
                      </div>
          
                      <div class="mt-3">
                          <span class="quota-badge ${creditClass}">
                              Kuota Credit : ${escapeHTML(course.creditQuota)}
                          </span>
                          <span class="quota-badge ${auditClass}">
                              Kuota Audit : ${escapeHTML(course.auditQuota)}
                          </span>
                      </div>
                  `;
          
                  // ⚠️ gunakan instance global (bukan new setiap klik)
                  if (window.courseModal) {
                      window.courseModal.show();
                  }
              });
          
              col.appendChild(card);
              return col;
          }

            /**
             * Escape HTML sederhana.
             */
            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            /**
             * Render semua course ke grid.
             */
            function renderAll(courses) {
                grid.innerHTML = '';
                if (courses.length === 0) {
                    noResults.classList.remove('d-none');
                    resultsCount.textContent = '';
                    return;
                }
                noResults.classList.add('d-none');
                courses.forEach(c => grid.appendChild(createCard(c)));
                resultsCount.textContent = `Menampilkan ${courses.length} course`;
            }

            /**
             * Filter berdasarkan input pencarian.
             */
            function filterCourses(query) {
                const q = query.toLowerCase().trim();
                if (!q) return coursesData;
                return coursesData.filter(c => {
                    const haystack = [
                        c.courseName, c.institution, c.category,
                        c.instructor, c.description
                    ].join(' ').toLowerCase();
                    return haystack.includes(q);
                });
            }

            // ── Event: Search ──
            searchInput.addEventListener('input', function() {
                const filtered = filterCourses(this.value);
                renderAll(filtered);
            });

            // ── Initial render ──
            renderAll(coursesData);

            console.log(`✅ Katalog siap! ${coursesData.length} course berhasil di-render dari JSON.`);
            console.log('💡 Untuk menambah course baru, cukup tambahkan objek ke array coursesData.');
        })();
    </script>
